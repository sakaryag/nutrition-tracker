{% extends "base.html" %}
{% block title %} — Register{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title" data-i18n="auth.register">Create Account</h1>
    {% if error %}
    <p class="auth-card__error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/register" novalidate>
      <div class="form-group">
        <label for="username" data-i18n="auth.username">Username</label>
        <input type="text" id="username" name="username" class="form-control" required autofocus />
      </div>
      <div class="form-group">
        <label for="password" data-i18n="auth.password">Password</label>
        <input type="password" id="password" name="password" class="form-control" minlength="6" required />
      </div>
      <div class="form-group">
        <label for="confirm" data-i18n="auth.confirmPassword">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" class="form-control" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="auth.createAccount">Register</button>
    </form>
    <p class="auth-card__footer"><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="/login" data-i18n="auth.loginLink">Log in</a></p>
  </div>
</section>
{% endblock %}
