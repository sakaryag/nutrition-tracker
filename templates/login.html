{% extends "base.html" %}
{% block title %} — Login{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title" data-i18n="auth.login">Log In</h1>
    {% if error %}
    <p class="auth-card__error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/login" novalidate>
      <div class="form-group">
        <label for="username" data-i18n="auth.username">Username</label>
        <input type="text" id="username" name="username" class="form-control" required autofocus />
      </div>
      <div class="form-group">
        <label for="password" data-i18n="auth.password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="auth.signIn">Log In</button>
    </form>
    <p class="auth-card__footer"><span data-i18n="auth.noAccount">Don't have an account?</span> <a href="/register" data-i18n="auth.registerLink">Register</a></p>
  </div>
</section>
{% endblock %}
