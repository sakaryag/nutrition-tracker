<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-bar">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Mustafa_Kemal_Ataturk_1934.jpg/120px-Mustafa_Kemal_Ataturk_1934.jpg" alt="Atatürk" class="nav-ataturk" />
      <a class="nav-brand" href="/">NutriTrack</a>
      <button class="lang-toggle" id="lang-toggle" title="TR/EN">&#127760; <span id="lang-label">EN</span></button>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/" class="nav-link" data-i18n="nav.dashboard">Dashboard</a></li>
        <li><a href="/history" class="nav-link" data-i18n="nav.history">History</a></li>
        <li><a href="/foods" class="nav-link" data-i18n="nav.myFoods">My Foods</a></li>
        <li><a href="/meals" class="nav-link" data-i18n="nav.meals">Meals</a></li>
        <li><a href="/chat" class="nav-link" data-i18n="nav.chat">Chat</a></li>
        <li><a href="/settings" class="nav-link" data-i18n="nav.settings">Settings</a></li>
        {% if config.get('AUTH_ENABLED') and session.get('user_id') %}
        <li><a href="/logout" class="nav-link" data-i18n="nav.logout">Logout</a></li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}

  <script>
  (function () {
    var toggle = document.getElementById('lang-toggle');
    var label  = document.getElementById('lang-label');

    function updateLangUI() {
      var l = Lang.get();
      label.textContent = l === 'tr' ? 'TR' : 'EN';
      toggle.classList.toggle('active', l === 'tr');
      applyTranslations();
    }

    toggle.addEventListener('click', function () {
      var next = Lang.get() === 'tr' ? 'en' : 'tr';
      Lang.set(next);
      updateLangUI();
    });

    updateLangUI();
  })();
  </script>
</body>
</html>
